<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Comic Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦸‍♂️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #1f2937; font-family: 'Inter', sans-serif; }
        .comic-title { font-family: 'Bangers', cursive; letter-spacing: 2px; text-shadow: 2px 2px 0px #9CA3AF; }
    </style>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

    <div class="max-w-2xl mx-auto px-4 text-center">
        <div class="bg-white rounded-xl shadow-lg p-12">
            <div class="text-8xl mb-6">:c</div>
            <h1 class="text-4xl comic-title text-gray-900 mb-4">¡Oops!</h1>
            <p class="text-xl text-gray-700 mb-8">{{ message if message else "Algo salió mal. No pudimos cargar esta página." }}</p>
            
            <div class="flex gap-4 justify-center">
                <a href="/" class="bg-white text-gray-900 border border-gray-900 font-semibold px-8 py-3 rounded-lg transition-all hover:bg-gray-900 hover:text-white">
                    ← Volver al inicio
                </a>
                <a href="javascript:history.back()" class="bg-white text-gray-700 border border-gray-300 font-semibold px-8 py-3 rounded-lg transition-all hover:bg-gray-100">
                    ← Volver atrás
                </a>
            </div>
        </div>
    </div>

</body>
</html>
